"$schema" = 'https://starship.rs/config-schema.json'

format = """
[î‚¶](color_bg_host)\
$os\
$username\
$hostname\
[î‚°](fg:color_bg_host bg:color_bg_dir)\
$directory\
[î‚°](fg:color_bg_dir bg:color_bg_vcs)\
$git_branch\
$git_status\
${custom.jj_status}\
[î‚°](fg:color_bg_vcs bg:color_bg_lang)\
$rust\
$dotnet\
$golang\
$nodejs\
$python\
[î‚°](fg:color_bg_lang bg:color_bg_env)\
$direnv\
${custom.tmux}\
$docker_context\
$conda\
[ ](bg:color_bg_env)\
[î‚°](fg:color_bg_env bg:color_bg_time)\
$time\
[î‚´](fg:color_bg_time)\
$line_break$character"""


palette = 'gruvbox_dark'

[palettes.gruvbox_dark]
color_bg_host  = '#d65d0e'
color_bg_dir  = '#d79921'
color_bg_vcs   = '#689d6a'
color_bg_lang  = '#458588'
color_bg_time  = '#3c3836'
color_bg_env   = '#665c54'
color_fg_dark  = '#1b1914'
color_fg_light = '#fbf1c7'
color_fg_green = '#98971a'
color_fg_red   = '#cc241d'


[os]
disabled = false
style = "bg:color_bg_host fg:color_fg_dark"

[os.symbols]
Windows = "َ°چ²"
Ubuntu = "َ°•ˆ"
SUSE = "ïŒ”"
Raspbian = "َ°گ؟"
Mint = "َ°£­"
Macos = "َ°€µ"
Manjaro = "ïŒ’"
Linux = "َ°Œ½"
Gentoo = "َ°£¨"
Fedora = "َ°£›"
Alpine = "ïŒ€"
Amazon = "ï‰°"
Android = "îœژ"
Arch = "َ°£‡"
Artix = "َ°£‡"
EndeavourOS = "ï†—"
CentOS = "ïŒ„"
Debian = "َ°£ڑ"
Redhat = "َ±„›"
RedHatEnterprise = "َ±„›"

[username]
show_always = true
aliases = { "sergey" = "me" }
format = '[ $user ](fg:color_fg_dark bg:color_bg_host)'

[hostname]
ssh_only = true
format = "[@ $hostname ](fg:color_fg_dark bg:color_bg_host)"


# Directory

[directory]
format = "[ $path ](fg:color_fg_dark bg:color_bg_dir)"
truncation_length = 5
truncation_symbol = "â€¦/"

[directory.substitutions]
"Documents" = "َ°ˆ™"
"Downloads" = "َ°‡ڑ"
"Projects" = "َ°²‹ "


# VCS

[git_branch]
format = '[ ïگک $branch ](fg:color_fg_dark bg:color_bg_vcs)'

[git_status]
format = '[($all_status$ahead_behind )](fg:color_fg_dark bg:color_bg_vcs)'

[custom.jj_status]
when = "jj root --ignore-working-copy"
format = "[ًں¥· $output ](fg:color_fg_dark bg:color_bg_vcs)"
command = '''
jj log --ignore-working-copy -r@ -n1 --no-graph -T "" --stat | tail -n1 | \
sd "(\d+) files? changed, (\d+) insertions?\(\+\), (\d+) deletions?\(-\)" ' ${1}m ${2}+ ${3}-' | sd " 0." ""
'''

# Languages

[rust]
format = '[ î‍¨( $version) ](fg:color_fg_dark bg:color_bg_lang)'

[dotnet]
format = '[ َ°ھ®( $version) ](fg:color_fg_dark bg:color_bg_lang)'

[golang]
format = '[ َ°ں“( $version) ](fg:color_fg_dark bg:color_bg_lang)'

[nodejs]
format = '[ َ°ژ™( $version) ](fg:color_fg_dark bg:color_bg_lang)'

[python]
format = '[ îک†( $version) ](fg:color_fg_dark bg:color_bg_lang)'


# Environment

[direnv]
disabled = false
format = '[ $loaded$allowed](fg:color_fg_light bg:color_bg_env)'
loaded_msg = "َ±†„"
unloaded_msg =""
allowed_msg = ""
denied_msg = "َ±¦ƒ"
not_allowed_msg = "َ±¦ƒ"

[custom.tmux]
# when = "echo $TERM_PROGRAM | grep tmux"
when = "echo $TERM_PROGRAM | grep tmux && tmux show -g status | grep 'status off'"
format = "[ \\[$output\\]](fg:color_fg_light bg:color_bg_env)"
command = "tmux show automatic-rename | grep -q 'automatic-rename off' && tmux display-message -p '#S~#W###{window_index}' || tmux display-message -p '#S###{window_index}'"

[docker_context]
format = '[ ïŒˆ( $context)](fg:color_fg_light bg:color_bg_env)'

[conda]
format = '[ î،»( $environment)](fg:color_fg_light bg:color_bg_env)'


# Time

[time]
disabled = false
time_format = "%R"
format = '[ ïگ؛ $time ](fg:color_fg_light bg:color_bg_time)'


# Prompt character

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[â‍œ](fg:color_fg_green)'
error_symbol = '[ïگ²](fg:color_fg_red)'
