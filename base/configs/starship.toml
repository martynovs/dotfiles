"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](color_orange)\
$os\
$username\
$hostname\
[](bg:color_yellow fg:color_orange)\
$directory\
[](fg:color_yellow bg:color_aqua)\
$git_branch\
$git_status\
${custom.jj_status}\
[](fg:color_aqua bg:color_blue)\
$rust\
$dotnet\
$golang\
$nodejs\
$python\
[](fg:color_blue bg:color_bg3)\
$docker_context\
$conda\
$direnv\
[](fg:color_bg3 bg:color_bg1)\
$time\
[](fg:color_bg1)\
$line_break$character"""

palette = 'gruvbox_dark'

[palettes.gruvbox_dark]
color_fg0 = '#1b1914'
color_fg1 = '#fbf1c7'
color_bg1 = '#3c3836'
color_bg3 = '#665c54'
color_blue = '#458588'
color_aqua = '#689d6a'
color_green = '#98971a'
color_orange = '#d65d0e'
color_purple = '#b16286'
color_red = '#cc241d'
color_yellow = '#d79921'
color_marine = '#83a598'

[os]
disabled = false
style = "bg:color_orange fg:color_fg0"

[os.symbols]
Windows = "󰍲"
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
Macos = "󰀵"
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
Arch = "󰣇"
Artix = "󰣇"
EndeavourOS = ""
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"

[username]
show_always = true
aliases = { "sergey" = "me" }
format = '[ $user ](fg:color_fg0 bg:color_orange)'

[hostname]
ssh_only = true
format = "[@ $hostname ](fg:color_fg0 bg:color_orange)"

[directory]
format = "[ $path ](fg:color_fg0 bg:color_yellow)"
truncation_length = 5
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙"
"Downloads" = "󰇚"
"Projects" = "󰲋 "

[git_branch]
format = '[  $branch ](fg:color_fg0 bg:color_aqua)'

[git_status]
format = '[($all_status$ahead_behind )](fg:color_fg0 bg:color_aqua)'

[custom.jj_status]
when = "jj root --ignore-working-copy"
format = "[🥷 $output ](fg:color_fg0 bg:color_aqua)"
command = '''
jj log --ignore-working-copy -r@ -n1 --no-graph -T "" --stat | tail -n1 | \
sd "(\d+) files? changed, (\d+) insertions?\(\+\), (\d+) deletions?\(-\)" ' ${1}m ${2}+ ${3}-' | sd " 0." ""
'''

[rust]
format = '[ ( $version) ](fg:color_fg0 bg:color_blue)'

[dotnet]
format = '[ 󰪮( $version) ](fg:color_fg0 bg:color_blue)'

[golang]
format = '[ 󰟓( $version) ](fg:color_fg0 bg:color_blue)'

[nodejs]
format = '[ 󰎙( $version) ](fg:color_fg0 bg:color_blue)'

[python]
format = '[ ( $version) ](fg:color_fg0 bg:color_blue)'

[docker_context]
format = '[ ( $context) ](fg:color_marine bg:color_bg3)'

[conda]
format = '[ ( $environment) ](fg:color_marine bg:color_bg3)'

[direnv]
disabled = false
format = '[ $loaded$allowed ](fg:color_fg1 bg:color_bg3)'
loaded_msg = "󱆄"
unloaded_msg =""
allowed_msg = ""
denied_msg = "󱦃"
not_allowed_msg = "󱦃"

[time]
disabled = false
time_format = "%R"
format = '[  $time ](fg:color_fg1 bg:color_bg1)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[](bold fg:color_green)'
error_symbol = '[](bold fg:color_red)'
vimcmd_symbol = '[](bold fg:color_green)'
vimcmd_replace_one_symbol = '[](bold fg:color_purple)'
vimcmd_replace_symbol = '[](bold fg:color_purple)'
vimcmd_visual_symbol = '[](bold fg:color_yellow)'
