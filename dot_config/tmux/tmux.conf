set -g history-limit 50000
set -g allow-passthrough on
set -g detach-on-destroy off
set -g status-position bottom
set -g focus-events on

# better detection of repeated keys
set -g repeat-time 1000

# support mouse
set -g mouse on
set -g escape-time 0 # disable escape timeouts
# smart mouse wheel handling based on pane command:
# - to hx/nvim send arrow keys
# - to other apps pass mouse events through
bind-key -T root WheelUpPane if-shell '[[ "#{pane_current_command}" =~ ^(hx|nvim)$ ]]' 'send-keys Up' 'send-keys -M'
bind-key -T root WheelDownPane if-shell '[[ "#{pane_current_command}" =~ ^(hx|nvim)$ ]]' 'send-keys Down' 'send-keys -M'

# Support Shift+Enter to send literal escape sequence for terminal apps that support it (e.g. hx/nvim/claude)
bind-key -T root S-Enter send-keys -l "\033[13;2u"

# automatically update titles
set -g set-titles on
set -g set-titles-string "#T"

# fix terminal colors and keys
set -s extended-keys always
set -g extended-keys-format csi-u
set -g default-terminal "${TERM}"
set -sa terminal-overrides ',*:RGB'
set -as terminal-features ',*:extkeys'
set -as terminal-features ',*:hyperlinks' # OSC 8 clickable links passthrough
# set -g xterm-keys on
# set -g default-terminal "tmux-256color"
# set -sa terminal-features 'xterm*:RGB'
# set -sa terminal-features 'xterm*:extkeys'

# undercurl support
set -sa terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -sa terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# panes visuals
set -g pane-border-lines simple # single | double | heavy | simple | number
set -g pane-border-indicators colour # off | colour | arrows | both
set -g pane-border-style fg=black,bright

# popup visuals
set -g popup-border-lines rounded # single | double | heavy | simple | rounded | padded | none
set -g popup-border-style fg=magenta

# be silent when a 'bell' rings
set -g visual-bell off
set -g visual-silence off
set -g visual-activity off
set -g bell-action none

# start window/pane numbering from 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on


## Key bindings

# reset key bindings
unbind-key -a
set -g prefix '§'

# client management
bind-key 'tab' copy-mode
bind-key '±' detach-client
bind-key 'b' set-option -g status
bind-key ':' command-prompt
bind-key ';' show-messages

# buffers management
bind-key '[' paste-buffer
bind-key ']' choose-buffer
# bind-key '\'' delete-buffer
# bind-key "\\" list-buffers

# split panes
bind-key 'v' split-window -v -l 10 -c "#{pane_current_path}"
bind-key '>' split-window -h -l 50 -c "#{pane_current_path}"
bind-key '"' split-window -v -c "#{pane_current_path}"
bind-key '|' split-window -h -c "#{pane_current_path}"

# pane management
bind-key M-BSpace kill-pane
bind-key Space next-layout
bind-key '0' resize-pane -Z # toggle pane zoom
bind-key '-' last-pane   -Z # focus last pane, preserving zoom
bind-key '+' select-pane -m # mark for join
bind-key '=' join-pane
bind-key '_' break-pane     # break pane into new window

# move pane
bind-key -T root M-'-' swap-pane -U
bind-key -T root M-'=' swap-pane -D

# focus pane
bind-key -T root M-'y' select-pane -U
bind-key -T root M-'h' select-pane -D
bind-key -T root M-'t' select-pane -L
bind-key -T root M-'u' select-pane -R

# resize pane
bind-key -T root M-'i' resize-pane -U 5
bind-key -T root M-'k' resize-pane -D 5
bind-key -T root M-'j' resize-pane -L 5
bind-key -T root M-'l' resize-pane -R 5

# window management
bind-key 'w' new-window -c "#{pane_current_path}"
bind-key '§' last-window

bind-key '1' select-window -t :1
bind-key '2' select-window -t :2
bind-key '3' select-window -t :3
bind-key '4' select-window -t :4
bind-key '5' select-window -t :5
bind-key '6' select-window -t :6
bind-key '7' select-window -t :7
bind-key '8' select-window -t :8
bind-key '9' select-window -t :9

bind-key -T root M-1 select-window -t :1
bind-key -T root M-2 select-window -t :2
bind-key -T root M-3 select-window -t :3
bind-key -T root M-4 select-window -t :4
bind-key -T root M-5 select-window -t :5
bind-key -T root M-6 select-window -t :6
bind-key -T root M-7 select-window -t :7
bind-key -T root M-8 select-window -t :8
bind-key -T root M-9 select-window -t :9

# global Ctrl-<n> (no prefix): switch to the session in slot n.
# Prefixed "n-" sessions pin to slot n; unprefixed ones fill the rest (see sessions-menu.sh).
bind-key -T root C-1 run-shell 'sh ~/.config/tmux/sessions-menu.sh 1'
bind-key -T root C-2 run-shell 'sh ~/.config/tmux/sessions-menu.sh 2'
bind-key -T root C-3 run-shell 'sh ~/.config/tmux/sessions-menu.sh 3'
bind-key -T root C-4 run-shell 'sh ~/.config/tmux/sessions-menu.sh 4'
bind-key -T root C-5 run-shell 'sh ~/.config/tmux/sessions-menu.sh 5'
bind-key -T root C-6 run-shell 'sh ~/.config/tmux/sessions-menu.sh 6'
bind-key -T root C-7 run-shell 'sh ~/.config/tmux/sessions-menu.sh 7'
bind-key -T root C-8 run-shell 'sh ~/.config/tmux/sessions-menu.sh 8'
bind-key -T root C-9 run-shell 'sh ~/.config/tmux/sessions-menu.sh 9'

# global session menus (rendered by the script), one row per slot:
#   Ctrl-§  (ctrl+prefix)  -> select menu, number switches to that slot
#   ±       (shift+prefix) -> assign menu, number assigns current session to that slot
bind-key -T root 'C-§' run-shell 'sh ~/.config/tmux/sessions-menu.sh menu select "#{session_name}" "#{client_name}"'
bind-key -T root '±'   run-shell 'sh ~/.config/tmux/sessions-menu.sh menu assign "#{session_name}" "#{client_name}"'

# command alias: ':srename' opens an editable prompt pre-filled with the current session name
set -s command-alias[100] 'srename=command-prompt -I "#S" -p "rename:" { rename-session -- "%%" }'

# command alias: ':we <branch>' opens a new window, switches its worktree to the branch and opens claude
set -s command-alias[101] "we=new-window -c '#{pane_current_path}' fish -ic 'wec \$argv; or exec fish -i'"

# command alias: ':wr <id>' opens a new window, switches its worktree to the MR and opens claude
set -s command-alias[102] "wr=new-window -c '#{pane_current_path}' fish -ic 'wrc \$argv; or exec fish -i'"


# Reload config
bind-key 'r' source-file ~/.config/tmux/tmux.conf \; display-message 'Config reloaded'

# Popups with useful commands
bind-key 'BSpace' display-popup -E  -w 40% -h 60% 'ttyper'
bind-key 'enter' display-popup -E -d "#{pane_current_path}" -w 80% -h 80% ''

# Open btop in a popup for the current dir
bind-key 't' display-popup -E -w 80% -h 80% 'btop'

# Open lazygit in a popup for the current dir
bind-key 'g' display-popup -EB -d "#{pane_current_path}" -w 100% -h 99% 'lazygit'

# Open vscode for current dir (see open.sh)
bind-key 'e' run-shell "sh ~/.config/tmux/open.sh editor \"#{pane_current_path}\""

# Tail clipboard's file path in a popup (see open.sh)
bind-key 'l' run-shell "sh ~/.config/tmux/open.sh tail \"#{pane_current_path}\""

# Toggle a horizontal pane tailing the clipboard's file path (second press closes it; see open.sh)
bind-key 'L' run-shell "sh ~/.config/tmux/open.sh tail-pane \"#{pane_current_path}\""

# nnn file sidebar that opens picks in the current editor pane (see open-file.sh)
bind-key 'f' run-shell "sh ~/.config/tmux/open-file.sh sidebar '#{pane_id}' '#{pane_current_path}'"

# Menu of `just` recipes for the current dir's justfile (see just-menu.sh)
bind-key 'j' run-shell 'sh ~/.config/tmux/just-menu.sh menu "#{pane_current_path}" "#{client_name}"'

# Claude code session dashboard
bind-key 's' display-popup -EB -w 100% -h 99% 'sesh-cc'

# Switch to claude focus window, or pick from the claude buffer (see claude.sh)
bind-key 'c' if-shell -F '#{@claude-focus-window}' \
  'run-shell "sh ~/.config/tmux/claude.sh switch-focus"' \
  'display-popup -E -T " Claude " "sh ~/.config/tmux/claude.sh show-buffer"'

# Always strip bullet from focused window's name; clear claude focus state only if it's the focus-window
set-hook -g after-select-window \
  'run-shell "sh ~/.config/tmux/claude.sh clear-focus \"#{session_name}\" \"#{window_index}\" \"#{window_name}\""'
set-hook -g client-session-changed \
  'run-shell "sh ~/.config/tmux/claude.sh clear-focus \"#{session_name}\" \"#{window_index}\" \"#{window_name}\""'


## Configure plugins

# tmux plugins manager
set -g @plugin 'tmux-plugins/tpm'

# gruvbox status bar
set -g @plugin 'egel/tmux-gruvbox'
set -g @tmux-gruvbox 'dark'
set -g @tmux-gruvbox-statusbar-alpha 'true'
set -g @tmux-gruvbox-right-status-z '#h #{?client_prefix,#[reverse] P #[noreverse],}#{?pane_in_mode,#[reverse] C #[noreverse],}'
set -g @tmux-gruvbox-left-status-a '#S#{@claude-status}'

# fast copy from window content
set -g @plugin 'laktak/extrakto'
set -g @extrakto_key 'p'
set -g @extrakto_copy_key     "enter"
set -g @extrakto_insert_key   "tab"
set -g @extrakto_popup_size   "80%,60%"
set -g @extrakto_prefix_name  "none"
set -g @extrakto_filter_order "path all word line"
set -g @extrakto_fzf_header   "f g i c o e h"

# quick menu for tmux commands
set -g @plugin 'sainnhe/tmux-fzf'
TMUX_FZF_LAUNCH_KEY="m"
TMUX_FZF_OPTIONS="-p -w 45% -h 50% -m"

# select session or create new from zoxide history
bind-key 'X' run-shell "sesh last"
bind-key 'x' run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '^a all ^t tmux ^x zoxide ^g configured ^d kill' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

# load plugins, this line should be last
source ~/.tmux/tmux.conf
